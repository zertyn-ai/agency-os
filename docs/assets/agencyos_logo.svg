<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 160" width="100%" height="100%">
  <defs>
    <!-- Premium Neon Glow Filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Engineering Grid Pattern -->
    <pattern id="grid-pattern" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
      <path d="M 0 24 L 24 24 24 0" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Dark Mode Premium Card Background -->
  <rect width="100%" height="100%" fill="#050505" rx="16" />
  <rect width="100%" height="100%" fill="url(#grid-pattern)" rx="16" />

  <!-- THE ISOMETRIC MULTIPLEXER ICON -->
  <!-- Bottom Pane (Agent Branch 2 - Purple) -->
  <g transform="translate(110, 115) scale(1, 0.55) rotate(45)">
    <rect x="-40" y="-40" width="80" height="80" rx="12" fill="#0A0A0A" stroke="#A855F7" stroke-width="3"/>
  </g>
  
  <!-- Middle Pane (Agent Branch 1 - Blue) -->
  <g transform="translate(110, 90) scale(1, 0.55) rotate(45)">
    <rect x="-40" y="-40" width="80" height="80" rx="12" fill="#0A0A0A" stroke="#3B82F6" stroke-width="3"/>
  </g>

  <!-- Top Pane (The Orchestrator / OS - Electric Cyan) -->
  <g transform="translate(110, 65) scale(1, 0.55) rotate(45)">
    <rect x="-40" y="-40" width="80" height="80" rx="12" fill="#0A0A0A" stroke="#00E5FF" stroke-width="4" filter="url(#neon-glow)"/>
    
    <!-- Terminal Prompt perfectly projected onto the 3D plane -->
    <path d="M -18 -10 L -6 0 L -18 10" fill="none" stroke="#00E5FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="0" y="6" width="16" height="4" fill="#00E5FF" rx="1"/>
  </g>

  <!-- HIGH-END TYPOGRAPHY LOCKUP -->
  <!-- "AGENCY" in tight, ultra-bold modern sans-serif -->
  <text x="210" y="105" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF" letter-spacing="-0.05em">AGENCY</text>

  <!-- "OS" Pill Badge -->
  <rect x="495" y="55" width="84" height="52" rx="26" fill="#00E5FF" fill-opacity="0.1" stroke="#00E5FF" stroke-width="2" filter="url(#neon-glow)"/>
  <text x="537" y="92" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="700" fill="#00E5FF" text-anchor="middle" letter-spacing="0.02em">OS</text>
</svg>