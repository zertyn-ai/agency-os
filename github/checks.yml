name: CI Checks
on: [pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Node projects
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            DIRS="."
          else
            DIRS=$(find . -maxdepth 3 -name "package.json" \
              -not -path "*/node_modules/*" \
              -not -path "*/.expo/*" \
              -exec dirname {} \;)
          fi

          if [ -z "$DIRS" ]; then
            echo "No Node projects found, skipping"
            exit 0
          fi

          for dir in $DIRS; do
            echo ""
            echo "════════════════════════════════════════"
            echo "  Node: $dir"
            echo "════════════════════════════════════════"
            pushd "$dir" > /dev/null

            # Install
            if [ -f "pnpm-lock.yaml" ]; then
              npm install -g pnpm
              pnpm install --frozen-lockfile
            elif [ -f "yarn.lock" ]; then
              yarn install --frozen-lockfile
            elif [ -f "package-lock.json" ]; then
              npm ci
            else
              npm install
            fi

            # Lint
            npm run lint --if-present

            # Type check
            if [ -f "tsconfig.json" ]; then
              npx tsc --noEmit
            fi

            # Tests
            npm test --if-present

            # Security audit (soft fail — transitive CVEs)
            npm audit --audit-level=high || true

            popd > /dev/null
          done

      - name: Check Python projects
        shell: bash
        run: |
          DIRS=$(find . -maxdepth 3 \( -name "requirements.txt" -o -name "pyproject.toml" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/venv/*" \
            -not -path "*/.venv/*" \
            -exec dirname {} \; | sort -u)

          if [ -z "$DIRS" ]; then
            echo "No Python projects found, skipping"
            exit 0
          fi

          for dir in $DIRS; do
            echo ""
            echo "════════════════════════════════════════"
            echo "  Python: $dir"
            echo "════════════════════════════════════════"
            pushd "$dir" > /dev/null

            python3 -m venv .ci-venv
            source .ci-venv/bin/activate

            if [ -f "requirements.txt" ]; then
              pip install -r requirements.txt
            elif [ -f "pyproject.toml" ]; then
              pip install .
            fi

            # Lint (soft fail — not all Python projects have lint configured)
            pip install ruff 2>/dev/null || true
            ruff check . || true

            # Tests (soft fail — not all Python projects have tests)
            if [ -d "tests" ] || ls test_*.py 1>/dev/null 2>&1; then
              pip install pytest 2>/dev/null || true
              python -m pytest || true
            fi

            deactivate
            popd > /dev/null
          done

      - name: Secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          ./gitleaks detect --source . --no-git --no-banner
